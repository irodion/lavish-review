<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — Review Cockpit visual direction</title>
<!--
  PROTOTYPE — throwaway. Four variants of the Review Cockpit's visual
  direction (A/B/C + D, the C×B synthesis added after the first review round),
  switchable via the floating bar (or ← / → keys), fed with the real review
  data from .review-agent/review.html (branch feat/39-layered-skeleton:
  4 threads, 12 claims, 10 files).

  Question this answers: what should the improved cockpit look like —
  sticky progress/filter chrome, L0 stat tiles, risk matrix, hunk-anchored
  diffs with line numbers, disposition-control polish?

  Deviations from the real cockpit, allowed because this is a prototype:
  inline JS/CSS (the real cockpit forbids inline script by CSP), innerHTML
  templating (real one is createElement/textContent only), variant routing on
  location.hash (#v=a|b|c — file:// blocks replaceState on ?query).
  Disposition state is in-memory only and shared across variants.

  Run: open prototypes/cockpit-visual-direction/prototype.html
-->
<style>
/* ============ reset-ish ============ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; }
a { color: inherit; }
kbd {
  font: 600 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
  border: 1px solid currentcolor; border-bottom-width: 2px;
  border-radius: 4px; padding: 2px 5px; opacity: .75;
}
:focus-visible { outline: 2px solid #6e40c9; outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

/* ============ shared diff renderer ============ */
.diff-table { width: 100%; border-collapse: collapse; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.diff-table td { padding: 0 8px; white-space: pre; }
.diff-table .lno {
  width: 1%; min-width: 40px; text-align: right; user-select: none;
  opacity: .45; font-size: 11px; border-right: 1px solid var(--dv-border, #2223);
}
.diff-table tr.dl-add td.code { background: var(--dv-addbg); }
.diff-table tr.dl-add td.code::before { content: "+ "; color: var(--dv-add); }
.diff-table tr.dl-del td.code { background: var(--dv-delbg); }
.diff-table tr.dl-del td.code::before { content: "− "; color: var(--dv-del); }
.diff-table tr.dl-ctx td.code::before { content: "  "; }
.diff-table tr.dl-hunk td {
  font-size: 11px; padding: 6px 8px; color: var(--dv-hunk);
  background: var(--dv-hunkbg); border-top: 1px solid var(--dv-border, #2223);
}
.diff-table tr.dl-hunk a { text-decoration: none; opacity: .8; }
.diff-table tr.dl-hunk a:hover { text-decoration: underline; opacity: 1; }
.diff-wrap { overflow-x: auto; border-radius: 8px; }
tr:target td, .hunk-hot td { background: var(--dv-target) !important; }
.diff-omitted { font-style: italic; opacity: .65; padding: 10px 12px; font-size: 13px; }

/* ================================================================
   VARIANT A — "Instrument rail" (dark, evolved document flow)
   ================================================================ */
.va {
  --bg: #0c1016; --panel: #131a23; --panel2: #0f151d; --border: #28303b;
  --fg: #e6edf3; --muted: #94a1ae; --accent: #4493f8;
  --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  --dv-add: #3fb950; --dv-addbg: #12261a; --dv-del: #f85149; --dv-delbg: #2d1518;
  --dv-hunk: #79b8ff; --dv-hunkbg: #0d1b2e; --dv-border: #28303b; --dv-target: #2a3040;
  background: var(--bg); color: var(--fg);
  font: 15px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; padding-bottom: 90px;
}
.va .microlabel, .vb .microlabel, .vc .microlabel {
  font: 600 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
  text-transform: uppercase; letter-spacing: .14em; color: var(--muted);
}

/* the signature: sticky verdict rail with the claim tape */
.va .rail {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 20px;
  padding: 10px 28px; background: color-mix(in srgb, var(--panel2) 88%, transparent);
  backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
}
.va .rail-id { min-width: 0; }
.va .rail-id .branch {
  font: 600 13px/1.3 ui-monospace, Menlo, monospace; color: var(--fg);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.va .rail-id .microlabel { margin-top: 2px; }
.va .tape { display: flex; gap: 3px; align-items: flex-end; margin: 0 auto; }
.va .tape-thread { display: flex; gap: 2px; padding: 3px; border: 1px solid var(--border); border-radius: 6px; }
.va .tape button {
  width: 14px; height: 22px; padding: 0; border: none; border-radius: 3px;
  background: #2a3340;
}
.va .tape button:hover { transform: translateY(-2px); }
.va .tape button[data-d="verified"] { background: var(--ok); }
.va .tape button[data-d="concern"]  { background: var(--bad); }
.va .tape button[data-d="question-open"] { background: var(--warn); }
.va .tape-label { text-align: center; margin-top: 3px; }
.va .rail-actions { display: flex; align-items: center; gap: 8px; }
.va .filters { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.va .filters button {
  background: none; border: none; color: var(--muted);
  font: 600 11px/1 ui-monospace, Menlo, monospace; padding: 7px 10px;
}
.va .filters button + button { border-left: 1px solid var(--border); }
.va .filters button[aria-pressed="true"] { background: var(--panel); color: var(--fg); }
.va .next-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--accent); color: #06101f; border: none; border-radius: 8px;
  font: 700 11.5px/1 ui-monospace, Menlo, monospace; padding: 8px 12px;
}
.va .next-btn kbd { border-color: #06101f55; color: #06101f; }

.va main { max-width: 1080px; margin: 0 auto; padding: 26px 28px; }

/* L0 — stat tiles + risk matrix + goal */
.va .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 18px 0; }
.va .tile { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.va .tile .n { font: 600 26px/1.1 ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
.va .tile .n small { font-size: 15px; color: var(--muted); font-weight: 500; }
.va .tile .microlabel { margin-top: 5px; }
.va .tile .n .pos { color: var(--ok); } .va .tile .n .neg { color: var(--bad); }
.va .l0-grid { display: grid; grid-template-columns: 1.25fr 1fr; gap: 18px; align-items: start; }
@media (max-width: 900px) { .va .l0-grid { grid-template-columns: 1fr; } }
.va .goal {
  background: var(--panel); border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0; padding: 12px 16px; margin: 0 0 12px;
}
.va .goal .microlabel { margin-bottom: 5px; }
.va .intent { color: var(--fg); margin: 0; font-size: 15px; }
.va .matrix { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.matrix table { border-collapse: separate; border-spacing: 2px; width: 100%; margin-top: 8px; }
.matrix th { font: 600 10px/1 ui-monospace, Menlo, monospace; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 4px 6px; text-align: center; }
.matrix th.rowh { text-align: left; font-size: 11px; text-transform: none; letter-spacing: 0; }
.matrix td { text-align: center; padding: 0; }
.matrix td button {
  width: 100%; border: none; border-radius: 4px; padding: 6px 0;
  font: 700 12px/1 ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums;
  background: var(--cellbg, transparent); color: var(--cellfg, var(--muted));
}
.matrix td button:disabled { cursor: default; opacity: .35; }
.matrix td button:not(:disabled):hover { filter: brightness(1.25); }

/* threads + claims */
.va section.thread { background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin: 18px 0; }
.va .thread-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 9px; }
.va .thread-head h2 { font-size: 16.5px; margin: 0; }
.va .tid { font: 600 11px/1 ui-monospace, Menlo, monospace; color: var(--accent); }
.va .thread-progress { margin-left: auto; font: 500 11px/1 ui-monospace, Menlo, monospace; color: var(--muted); }
.va .thread-progress .warned { color: var(--warn); }
.va .thread-summary { color: var(--muted); font-size: 14px; margin: 10px 0 4px; }
.va .thread-paths { font: 11.5px/1.8 ui-monospace, Menlo, monospace; color: var(--muted); margin: 0 0 8px; }
.va details.claim { border: 1px solid var(--border); border-radius: 9px; margin: 9px 0; background: var(--panel); }
.va details.claim[data-disposition="verified"] { border-left: 3px solid var(--ok); }
.va details.claim[data-disposition="concern"] { border-left: 3px solid var(--bad); }
.va details.claim[data-disposition="question-open"] { border-left: 3px solid var(--warn); }
.va details.claim > summary { list-style: none; display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; }
.va details.claim > summary::-webkit-details-marker { display: none; }
.va details.claim > summary:hover { background: #182130; }
.va details.claim[open] > summary { border-bottom: 1px solid var(--border); }
.va .claim-text { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 240px; }
.claim-hidden { display: none !important; }

/* neutral kind mark + colored judgment chips (shared shape) */
.kind {
  font: 700 9.5px/1 ui-monospace, Menlo, monospace; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; white-space: nowrap;
}
.jchip {
  font: 700 9.5px/1 ui-monospace, Menlo, monospace; letter-spacing: .08em;
  text-transform: uppercase; border-radius: 999px; padding: 4px 8px; white-space: nowrap;
  border: 1px solid transparent;
}
.jchip.lv-low  { color: var(--ok);  border-color: color-mix(in srgb, var(--ok) 45%, transparent); }
.jchip.lv-medium { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, transparent); }
.jchip.lv-high { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, transparent); }
.jchip.conf { opacity: .85; }

/* disposition segmented control */
.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; margin-left: auto; }
.seg button {
  background: none; border: none; color: var(--muted);
  font: 600 10.5px/1 ui-monospace, Menlo, monospace; padding: 6px 10px; white-space: nowrap;
}
.seg button + button { border-left: 1px solid var(--border); }
.seg button[aria-pressed="true"][data-d="verified"] { background: color-mix(in srgb, var(--ok) 18%, transparent); color: var(--ok); }
.seg button[aria-pressed="true"][data-d="concern"] { background: color-mix(in srgb, var(--bad) 18%, transparent); color: var(--bad); }
.seg button[aria-pressed="true"][data-d="question-open"] { background: color-mix(in srgb, var(--warn) 18%, transparent); color: var(--warn); }

.va .claim-body { padding: 12px 16px; }
.claim-body h4 { margin: 12px 0 5px; font: 600 10px/1.2 ui-monospace, Menlo, monospace; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); }
.claim-body p.detail { margin: 0; font-size: 13.5px; color: var(--muted); }
.claim-body ul { margin: 0; padding-left: 18px; font-size: 13.5px; }
.claim-body ul li { margin: 3px 0; }
.claim-body .ev a { font: 12px/1.5 ui-monospace, Menlo, monospace; color: var(--accent); text-decoration: none; }
.claim-body .ev a:hover { text-decoration: underline; }
.claim-body .ev .note { color: var(--muted); }

/* L3 files */
.va details.file { border: 1px solid var(--border); border-radius: 9px; margin: 9px 0; background: var(--panel); }
.va details.file > summary { list-style: none; display: flex; align-items: baseline; gap: 10px; padding: 10px 14px; cursor: pointer; font: 13px/1.4 ui-monospace, Menlo, monospace; color: var(--accent); flex-wrap: wrap; }
.va details.file > summary::-webkit-details-marker { display: none; }
.va details.file > summary:hover { background: #182130; }
.filestats { font: 11px/1 ui-monospace, Menlo, monospace; color: var(--muted); font-variant-numeric: tabular-nums; }
.filestats .a { color: var(--ok); } .filestats .d { color: var(--bad); }
.cited-by { margin-left: auto; font: 10.5px/1 ui-monospace, Menlo, monospace; color: var(--muted); }
.cited-by a { color: var(--muted); text-decoration: none; }
.cited-by a:hover { color: var(--accent); }
.statbar { display: inline-flex; height: 6px; width: 84px; border-radius: 3px; overflow: hidden; background: #2a3340; }
.statbar i { display: block; height: 100%; }
.statbar .ba { background: var(--ok); } .statbar .bd { background: var(--bad); }
.va .file-body { border-top: 1px solid var(--border); }
.va section.evidence > h2, .va .l0 > h2 { font: 600 11px/1.2 ui-monospace, Menlo, monospace; text-transform: uppercase; letter-spacing: .16em; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 7px; }

/* ================================================================
   VARIANT B — "Navigator workbench" (light two-pane)
   ================================================================ */
.vb {
  --bg: #eef1f4; --paper: #ffffff; --border: #d0d7de; --fg: #1f2328;
  --muted: #57606a; --accent: #0969da;
  --ok: #1a7f37; --warn: #9a6700; --bad: #cf222e;
  --dv-add: #1a7f37; --dv-addbg: #dafbe1; --dv-del: #cf222e; --dv-delbg: #ffebe9;
  --dv-hunk: #0969da; --dv-hunkbg: #ddf4ff; --dv-border: #d0d7de; --dv-target: #fff8c5;
  background: var(--bg); color: var(--fg);
  font: 15px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; display: grid; grid-template-columns: 292px 1fr;
}
.vb .nav {
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  background: var(--paper); border-right: 1px solid var(--border); padding: 18px 16px 90px;
}
.vb .nav .branch { font: 600 13px/1.35 ui-monospace, Menlo, monospace; word-break: break-all; }
.vb .nav .basehead { margin: 3px 0 14px; }
.vb .ring-row { display: flex; gap: 12px; align-items: center; background: #f6f8fa; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 16px; }
.vb .ring { width: 46px; height: 46px; }
.vb .ring-num { font: 700 15px/1.1 ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
.vb .navsec { margin: 16px 0 6px; }
.vb .nav a.navlink { display: block; text-decoration: none; border-radius: 7px; padding: 7px 9px; }
.vb .nav a.navlink:hover { background: #f0f3f6; }
.vb .navlink .t { display: flex; gap: 7px; align-items: baseline; font-size: 13px; font-weight: 600; }
.vb .navlink .t .tid { color: var(--accent); font: 700 10.5px/1 ui-monospace, Menlo, monospace; }
.vb .navlink .dots { display: flex; gap: 3px; margin-top: 5px; align-items: center; }
.vb .navlink .dots i { width: 8px; height: 8px; border-radius: 50%; background: #d8dee4; }
.vb .navlink .dots i[data-d="verified"] { background: var(--ok); }
.vb .navlink .dots i[data-d="concern"] { background: var(--bad); }
.vb .navlink .dots i[data-d="question-open"] { background: var(--warn); }
.vb .navlink .dots .frac { margin-left: auto; font: 10.5px/1 ui-monospace, Menlo, monospace; color: var(--muted); }
.vb .nav a.filelink { display: flex; gap: 8px; align-items: baseline; text-decoration: none; font: 11.5px/1.9 ui-monospace, Menlo, monospace; color: var(--fg); padding: 0 9px; border-radius: 5px; }
.vb .nav a.filelink:hover { background: #f0f3f6; }
.vb .nav a.filelink .p { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.vb .content { padding: 26px 34px 110px; max-width: 1020px; margin: 0 auto; width: 100%; min-width: 0; }
.vb .pagehead h1 { margin: 0; font-size: 21px; }
.vb .pagehead .sub { color: var(--muted); font-size: 14px; margin: 4px 0 0; }
.vb .strip { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 20px; }
.vb .strip .cell { background: var(--paper); border: 1px solid var(--border); border-radius: 9px; padding: 9px 14px; }
.vb .strip .cell .n { font: 700 17px/1.2 ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
.vb .strip .cell .n .pos { color: var(--ok); } .vb .strip .cell .n .neg { color: var(--bad); }
.vb .goalcard { background: var(--paper); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 10px; padding: 14px 18px; margin-bottom: 14px; }
.vb .goalcard .intent { margin: 8px 0 0; color: var(--fg); }
.vb .matrix { background: var(--paper); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px 14px; margin-bottom: 22px; max-width: 560px; }
.vb section.thread { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 16px 22px; margin: 16px 0; }
.vb .thread-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.vb .thread-head h2 { margin: 0; font-size: 17px; }
.vb .tid { font: 700 11px/1 ui-monospace, Menlo, monospace; color: var(--accent); }
.vb .thread-progress { margin-left: auto; font: 500 11px/1 ui-monospace, Menlo, monospace; color: var(--muted); }
.vb .thread-summary { color: var(--muted); font-size: 14px; margin: 8px 0 2px; }
.vb .thread-paths { font: 11.5px/1.8 ui-monospace, Menlo, monospace; color: var(--muted); margin: 2px 0 10px; }
.vb details.claim { border: 1px solid var(--border); border-radius: 9px; margin: 10px 0; }
.vb details.claim[data-disposition="verified"] { border-left: 4px solid var(--ok); }
.vb details.claim[data-disposition="concern"] { border-left: 4px solid var(--bad); }
.vb details.claim[data-disposition="question-open"] { border-left: 4px solid var(--warn); }
.vb details.claim > summary { list-style: none; display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; flex-wrap: wrap; }
.vb details.claim > summary::-webkit-details-marker { display: none; }
.vb details.claim > summary:hover { background: #f6f8fa; }
.vb details.claim[open] > summary { border-bottom: 1px solid var(--border); }
.vb .claim-text { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 240px; }
.vb .claim-body { padding: 12px 16px; }
.vb .saved-hint { font: 10.5px/1 ui-monospace, Menlo, monospace; color: var(--muted); margin-left: 8px; opacity: 0; }
.vb .saved-hint.show { opacity: 1; transition: opacity .2s; }
.vb details.file { background: var(--paper); border: 1px solid var(--border); border-radius: 9px; margin: 10px 0; }
.vb details.file > summary { list-style: none; display: flex; align-items: baseline; gap: 10px; padding: 10px 14px; cursor: pointer; font: 13px/1.4 ui-monospace, Menlo, monospace; color: var(--accent); flex-wrap: wrap; }
.vb details.file > summary::-webkit-details-marker { display: none; }
.vb details.file > summary:hover { background: #f6f8fa; }
.vb .file-body { border-top: 1px solid var(--border); }
.vb h3.secline { font: 600 11px/1.2 ui-monospace, Menlo, monospace; text-transform: uppercase; letter-spacing: .16em; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 7px; margin: 28px 0 8px; }

/* ================================================================
   VARIANT C — "Triage deck" (near-black keyboard-first queue)
   ================================================================ */
.vc {
  --bg: #07090c; --card: #10151c; --card2: #0b0f14; --border: #232b35;
  --fg: #e9eef4; --muted: #8b98a5; --accent: #4493f8;
  --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  --dv-add: #3fb950; --dv-addbg: #10241a; --dv-del: #f85149; --dv-delbg: #2b1417;
  --dv-hunk: #79b8ff; --dv-hunkbg: #0c1a2c; --dv-border: #232b35; --dv-target: #253044;
  background: var(--bg); color: var(--fg);
  font: 15px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh; padding-bottom: 90px;
}
.vc .topbar {
  display: flex; align-items: baseline; gap: 16px; padding: 12px 26px;
  border-bottom: 1px solid var(--border);
}
.vc .topbar .branch { font: 600 13px/1.3 ui-monospace, Menlo, monospace; }
.vc .topbar .counts { margin-left: auto; font: 11.5px/1 ui-monospace, Menlo, monospace; color: var(--muted); font-variant-numeric: tabular-nums; }
.vc .topbar .counts b.c-ok { color: var(--ok); } .vc .topbar .counts b.c-bad { color: var(--bad); } .vc .topbar .counts b.c-warn { color: var(--warn); }
.vc .deck { display: grid; grid-template-columns: 64px minmax(0, 880px); gap: 22px; justify-content: center; padding: 26px 20px 0; }
@media (max-width: 760px) { .vc .deck { grid-template-columns: minmax(0,1fr); } .vc .dotrail { display: none; } }
.vc .dotrail { display: flex; flex-direction: column; gap: 5px; align-items: center; position: sticky; top: 24px; align-self: start; }
.vc .dotrail .tsep { font: 600 9px/1 ui-monospace, Menlo, monospace; color: var(--muted); margin: 6px 0 2px; letter-spacing: .1em; }
.vc .dotrail button { width: 24px; height: 12px; border-radius: 4px; border: 1px solid var(--border); background: #1a212b; padding: 0; }
.vc .dotrail button[data-d="verified"] { background: var(--ok); border-color: var(--ok); }
.vc .dotrail button[data-d="concern"] { background: var(--bad); border-color: var(--bad); }
.vc .dotrail button[data-d="question-open"] { background: var(--warn); border-color: var(--warn); }
.vc .dotrail button.cur { outline: 2px solid var(--accent); outline-offset: 1px; }
.vc .stage { min-width: 0; }
.vc .crumb { font: 11px/1.4 ui-monospace, Menlo, monospace; color: var(--muted); letter-spacing: .06em; margin-bottom: 8px; }
.vc .crumb .tid { color: var(--accent); font-weight: 700; }

const DISPOSITIONS = ["verified", "concern", "question-open"];

const state = {

function allClaims() {
  return DATA.threads.flatMap(t => t.claims.map(c => ({ ...c, thread: t })));

function fileById(id) { return DATA.files.find(f => f.id === id); }
function dispOf(id) { return state.dispositions[id] || null; }
function counts() {
  const all = allClaims();
  const reviewed = all.filter(c => dispOf(c.id)).length;
  const by = { verified: 0, concern: 0, "question-open": 0 };
  all.forEach(c => { const d = dispOf(c.id); if (d) by[d]++; });
  return { total: all.length, reviewed, ...by };
}
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

/* ---------- shared renderers ---------- */
function kindMark(c) { return `<span class="kind">${c.kind}</span>`; }

  const lv = { high: "lv-low", medium: "lv-medium", low: "lv-high" }[c.conf]; // high conf = calm green
  return `<span class="jchip conf ${lv}">conf ${c.conf}</span>`;
}
function riskChips(c) {
  if (c.kind !== "risk") return "";
  return `<span class="jchip lv-${c.level}">${c.category} · ${c.level}</span>`;
}
function segControl(c, extra) {
  return `<span class="seg" role="group" aria-label="Disposition for ${c.id}">` + DISPOSITIONS.map(d =>
    `<button data-set-disposition="${d}" data-claim="${c.id}" data-d="${d}" aria-pressed="${dispOf(c.id) === d}">${DLABEL[d]}</button>`

}

  return `<ul class="ev">` + c.evidence.map(e => {
    if (!e.file) return `<li><span class="note">${esc(e.note)}</span></li>`;
    const f = fileById(e.file);
    const anchor = e.hunk ? `${variantPrefix}-${f.id}-h${e.hunk}` : `${variantPrefix}-${f.id}`;

    return `<li><a href="#${anchor}" data-reveal>${esc(f.path)}${e.hunk ? ` · hunk ${e.hunk}` : ""}</a>${note}</li>`;
  }).join("") + `</ul>`;
}
function claimBody(c, variantPrefix) {
  return `<div class="claim-body">` +
    (c.detail ? `<p class="detail">${esc(c.detail)}</p>` : "") +
    `<h4>Challenge</h4><ul>` + c.challenge.map(q => `<li>${esc(q)}</li>`).join("") + `</ul>` +
    `<h4>Evidence</h4>` + evidenceList(c, variantPrefix) +
    `</div>`;

    }
    const c0 = line[0];
    if (c0 === "+") return `<tr class="dl-add"><td class="lno"></td><td class="lno">${newLn++}</td><td class="code">${esc(line.slice(1))}</td></tr>`;
    if (c0 === "-") return `<tr class="dl-del"><td class="lno">${oldLn++}</td><td class="lno"></td><td class="code">${esc(line.slice(1))}</td></tr>`;
    return `<tr class="dl-ctx"><td class="lno">${oldLn++}</td><td class="lno">${newLn++}</td><td class="code">${esc(line.replace(/^ /, ""))}</td></tr>`;
  });
  return `<div class="diff-wrap"><table class="diff-table">${rows.join("")}</table></div>`;
}
function fileBody(f, anchorBase) {
  if (f.hunks) return renderDiff(f.hunks, anchorBase);
  return `<p class="diff-omitted">diff body not embedded in this prototype — stats only (+${f.add} / −${f.del})</p>`;
}
function statBar(f) {
  const total = f.add + f.del || 1;
  const max = Math.max(...DATA.files.map(x => x.add + x.del));
  const w = Math.max(6, Math.round(84 * total / max));
  const aw = Math.round(w * f.add / total);
  return `<span class="statbar" style="width:${w}px" title="+${f.add} −${f.del}"><i class="ba" style="width:${aw}px"></i><i class="bd" style="width:${w - aw}px"></i></span>`;
}
function citedBy(f) {
  const refs = allClaims().filter(c => c.evidence.some(e => e.file === f.id)).map(c => c.id);
  if (!refs.length) return "";
  return `<span class="cited-by">cited by ${refs.map(r => `<a href="#claim-${r}" data-reveal>${r}</a>`).join(", ")}</span>`;
}
function riskMatrix() {
  const risks = allClaims().filter(c => c.kind === "risk");
  const cats = RISK_CATEGORIES.filter(cat => risks.some(r => r.category === cat));
  const cellColor = { low: "var(--ok)", medium: "var(--warn)", high: "var(--bad)" };
  let html = `<div class="matrix"><span class="microlabel">Risk matrix — ${risks.length} risk claims</span><table><tr><th class="rowh"></th>` +
    LEVELS.map(l => `<th>${l}</th>`).join("") + `</tr>`;
  for (const cat of cats) {
    html += `<tr><th class="rowh">${cat.replace("_", " ")}</th>`;
    for (const lv of LEVELS) {
      const hits = risks.filter(r => r.category === cat && r.level === lv);
      if (!hits.length) { html += `<td><button disabled>·</button></td>`; continue; }
      html += `<td><button data-jump="claim-${hits[0].id}" style="--cellbg: color-mix(in srgb, ${cellColor[lv]} 22%, transparent); --cellfg: ${cellColor[lv]}" title="${hits.map(h => h.id).join(", ")}">${hits.length}</button></td>`;
    }
    html += `</tr>`;
  }
  return html + `</table></div>`;
}

/* ================= chrome refresh + events ================= */
const VARIANTS = { a: { name: "Instrument rail", render: renderA }, b: { name: "Navigator workbench", render: renderB }, c: { name: "Triage deck", render: renderC }, d: { name: "Map + deck (C×B)", render: renderD } };
let current = (location.hash.match(/v=([abcd])/) || [])[1] || "a";
const root = document.getElementById("root");

function threadProgressText(t) {
  const done = t.claims.filter(c => dispOf(c.id)).length;
  const concerns = t.claims.filter(c => dispOf(c.id) === "concern").length;
  return `${done}/${t.claims.length} reviewed` + (concerns ? ` · <span class="warned">${concerns} concern${concerns === 1 ? "" : "s"}</span>` : "");
}
function snapshotOpenDetails() {
  state.openDetails = new Set([...root.querySelectorAll("details[open]")].map(d => d.id).filter(Boolean));
}
function render() {
  root.innerHTML = VARIANTS[current].render();
  root.querySelectorAll("[data-thread-progress]").forEach(el => {
    const t = DATA.threads.find(x => x.id === el.dataset.threadProgress);
    el.innerHTML = threadProgressText(t);
  });
  applyFilter();
  document.getElementById("sw-label").innerHTML =
    `${current.toUpperCase()} <small>— ${VARIANTS[current].name}</small>`;
  document.title = `PROTOTYPE ${current.toUpperCase()} — ${VARIANTS[current].name}`;
}
function applyFilter() {
  if (current !== "a") return;
  root.querySelectorAll("details.claim").forEach(el => {
    const d = el.getAttribute("data-disposition");
    let hide = false;
    if (state.filter === "unreviewed") hide = !!d;
    if (state.filter === "concerns") hide = d !== "concern";
    if (state.filter === "high-risk") hide = !["medium", "high"].includes(el.dataset.level);
    el.classList.toggle("claim-hidden", hide);
  });
}
function setVariant(v) {
  snapshotOpenDetails();
  current = v;
  history.replaceState(null, "", "#v=" + v);
  render();
  window.scrollTo(0, 0);
}
function setDisposition(claimId, d) {
  const next = state.dispositions[claimId] === d ? null : d;
  if (next) state.dispositions[claimId] = next; else delete state.dispositions[claimId];
  snapshotOpenDetails();
  const y = window.scrollY;
  if ((current === "c" || current === "d") && next) {
    const claims = allClaims();
    const after = claims.findIndex((c, i) => i > state.focus && !dispOf(c.id));
    state.focus = after !== -1 ? after : Math.min(state.focus + 1, claims.length - 1);
  }
  render();
  window.scrollTo(0, y);
  if (current === "b" && next) {
    const hint = root.querySelector(`[data-saved="${CSS.escape(claimId)}"]`);
    if (hint) { hint.classList.add("show"); setTimeout(() => hint.classList.remove("show"), 1200); }
  }
}
function jumpTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  for (let n = el; n; n = n.parentElement) if (n.tagName === "DETAILS") n.open = true;
  requestAnimationFrame(() => el.scrollIntoView({ block: "center" }));
  el.classList.add("hunk-hot");
  setTimeout(() => el.classList.remove("hunk-hot"), 1400);
}

root.addEventListener("click", e => {
  const dispBtn = e.target.closest("[data-set-disposition]");
  if (dispBtn) { e.preventDefault(); e.stopPropagation(); setDisposition(dispBtn.dataset.claim, dispBtn.dataset.setDisposition); return; }
  const jump = e.target.closest("[data-jump]");
  if (jump) { e.preventDefault(); jumpTo(jump.dataset.jump); return; }
  const filt = e.target.closest("[data-filter-set]");
  if (filt) { state.filter = filt.dataset.filterSet; snapshotOpenDetails(); const y = scrollY; render(); scrollTo(0, y); return; }
  const nxt = e.target.closest("[data-next-unreviewed]");
  if (nxt) { const c = allClaims().find(c => !dispOf(c.id)); if (c) jumpTo("claim-" + c.id); return; }
  const foc = e.target.closest("[data-focus]");
  if (foc) { e.preventDefault(); state.focus = +foc.dataset.focus; render(); return; }
  const step = e.target.closest("[data-step]");
  if (step) { state.focus += +step.dataset.step; render(); return; }
  const rev = e.target.closest("a[data-reveal]");
  if (rev) { e.preventDefault(); jumpTo(rev.getAttribute("href").slice(1)); return; }
});

document.getElementById("sw-prev").addEventListener("click", () => cycle(-1));
document.getElementById("sw-next").addEventListener("click", () => cycle(1));
function cycle(dir) {
  const keys = Object.keys(VARIANTS);
  setVariant(keys[(keys.indexOf(current) + dir + keys.length) % keys.length]);
}
document.addEventListener("keydown", e => {
  if (/input|textarea|select/i.test(e.target.tagName) || e.target.isContentEditable) return;
  if (e.key === "ArrowLeft") return cycle(-1);
  if (e.key === "ArrowRight") return cycle(1);
  const k = e.key.toLowerCase();
  if (current === "a" && k === "n") { const c = allClaims().find(c => !dispOf(c.id)); if (c) jumpTo("claim-" + c.id); }
  if (current === "c" || current === "d") {
    const claims = allClaims();
    if (k === "j") { state.focus = Math.min(state.focus + 1, claims.length - 1); render(); }
    if (k === "k") { state.focus = Math.max(state.focus - 1, 0); render(); }
    if (k === "v") setDisposition(claims[state.focus].id, "verified");
    if (k === "c") setDisposition(claims[state.focus].id, "concern");
    if (k === "q") setDisposition(claims[state.focus].id, "question-open");
  }
});

window.addEventListener("hashchange", () => {
  const v = (location.hash.match(/v=([abcd])/) || [])[1];
  if (v && v !== current) { snapshotOpenDetails(); current = v; render(); }
});

render();
</script>
</body>
